<ion-content class="background">

  <ion-grid id="main-grid" class="ion-no-margin ion-no-padding justify-content-center">
    <ion-row class="ion-no-margin ion-no-padding">
      <ion-col class="ion-no-margin ion-no-padding ion-text-center" size-sm="8" offset-sm="2" size-md="6" offset-md="3" size-xl="4" offset-xl="4">

        <ion-card *ngFor="let item of information; let i = index;" (click)="openModalSearch(item.name, i)" [class.active]="currentIndex == i" color="{{item.name}}" lines="none" detail="false" disabled="{{item.disabled}}" no-padding>
          <div>
          <ion-card-content id="{{item.name}}">
            <ion-item color="{{item.name}}" lines="none">
              <div class="titlecard">
                <ion-text [class.active]="currentIndex == i">Choose a </ion-text>
                <ion-card-title [class.active]="currentIndex == i" [class.chosen]="currentIndex > i" class="title">{{item.name | titlecase}}</ion-card-title>
              </div>
              <div class="overlapping" slot="end" style="margin-left: 10px;">  
             <ion-icon class ="search-icon" name="search-outline" color="dark"></ion-icon>
            </div>
            </ion-item>
          </ion-card-content>

          <ion-item color="{{item.name}}" class="selected" disabled="{{item.disabled}}">
            <div class="selectedoption">
              <ion-label class="base">{{selectedOptions[item.name].base}}  </ion-label>
              <ion-label class="translation">{{selectedOptions[item.name].translation }}</ion-label>
            </div>
          </ion-item>
          </div>
        </ion-card>
        
      </ion-col>
      
    </ion-row>
  </ion-grid>



  <ion-grid id= "result-grid" class="ion-no-margin ion-no-padding justify-content-center">
      <ion-row class="ion-no-margin ion-no-padding">
        <ion-col class="ion-no-margin ion-no-padding ion-text-center" size-sm="8" offset-sm="2" size-md="6" offset-md="3" size-xl="4" offset-xl="4">
          <div id="result-box">
            <div style="height:100%; width: 100%;" *ngFor="let result of results">
                <app-result *ngIf="show_result"
                [tier]="tier"
                [data]="result"
                ></app-result>
              </div>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
